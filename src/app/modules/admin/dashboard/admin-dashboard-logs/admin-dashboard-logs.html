<section class="admin-logs dashboard-list-page page-transition">
  <header class="app-page-header">
    <h1 class="app-page-title">操作紀錄</h1>
  </header>

  <div class="app-filter-bar logs-filter">
    <label class="app-search-field">
      <span class="app-control-title">操作</span>
      <span class="app-search-input">
        <i class="bi bi-search"></i>
        <input
          type="search"
          placeholder="請輸入操作人／對象／Email／內容"
          [value]="searchKeyword"
          (input)="onSearchKeywordInput($event)"
          (keydown.enter)="onSearch()"
        />
      </span>
    </label>

    <app-dropdown
      #operationDropdown
      title="操作類型"
      placeholder="全部"
      [options]="operationOptions"
      (optionSelected)="onOperationSelected($event)"
    ></app-dropdown>

    <app-dropdown
      title="對象角色"
      placeholder="全部"
      [options]="targetRoleOptions"
      (optionSelected)="onTargetRoleSelected($event)"
    ></app-dropdown>

    <app-date-range-selector
      selectorTitle="操作日期"
    ></app-date-range-selector>

    <button type="button" class="app-btn search" (click)="onSearch()">
      <i class="bi bi-search"></i>
      <span>搜尋</span>
    </button>
  </div>
  <div class="result-section" #resultSection>
    <div class="table-wrapper dashboard-list-content" #tableWrapper>
      <table class="logs-table">
        <thead>
          <tr>
            <th class="log-operator">操作人</th>
            <th class="log-actionType">操作類型</th>
            <th class="log-targetRole">對象角色</th>
            <th class="log-target">操作對象</th>
            <th class="log-email">Email</th>
            <th class="log-ctime">操作時間</th>
            <th class="log-details">操作內容</th>
          </tr>
        </thead>
        <tbody>
          @for (log of logs; track log.id) {
            <tr>
              <td class="log-operator">{{ log.operator }}</td>
              <td class="log-actionType">
                <span class="actionType-tag" [class]="getOperationClass(log.actionType)">{{ log.actionType }}</span>
              </td >
              <td class="log-targetRole">
                <span class="target-role-tag" [class.organizer]="log.targetRole === '主辦方'">{{ log.targetRole }}</span>
              </td>
              <td class="log-target">{{ log.target }}</td>
              <td class="log-email">{{ log.targetEmail }}</td>
              <td class="log-ctime">{{ formatDateTime(log.createdAt) }}</td>
              <td class="log-details">{{ log.details }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="7" class="empty-row">查無符合條件的操作紀錄</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

  <app-dashboard-pagination
    class="dashboard-list-pagination"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
