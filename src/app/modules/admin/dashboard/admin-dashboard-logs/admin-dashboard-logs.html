<section class="admin-logs page-transition">
  <h1 class="page-title">操作紀錄</h1>

  <div class="search-bar">
    <app-admin-dashboard-serch-input
      searchTitle="操作"
      placeholder="請輸入操作人/操作內容"
    ></app-admin-dashboard-serch-input>

    <app-admin-dashboard-dropdown
      #oprationDropdown
      title="操作類型"
      placeholder="全部"
      [options]="oprationOptions"
      (optionSelected)="onOprationSelected($event)"
    ></app-admin-dashboard-dropdown>

    <app-admin-dashboard-time-selector
      selectorTitle="日期區間"
    ></app-admin-dashboard-time-selector>

    <app-admin-dashboard-button type="search" [todo]="onSearchHandler"></app-admin-dashboard-button>
    <app-admin-dashboard-button type="clear" [todo]="onClearHandler"></app-admin-dashboard-button>
  </div>

  <div class="table-wrapper" #tableWrapper>
    <table class="logs-table">
      <thead>
        <tr>
          <th class="log-ctime">操作時間</th>
          <th class="log-operator">操作人</th>
          <th class="log-actionType">操作類型</th>
          <th class="log-target">操作對象</th>
          <th class="log-details">操作內容</th>
        </tr>
      </thead>
      <tbody>
        @for (log of logs; track log.id) {
          <tr>
            <td class="log-ctime">{{ log.createdAt }}</td>
            <td class="log-operator">{{ log.operator }}</td>
            <td class="log-actionType">
              <span class="actionType-tag" [class]="getOprationClass(log.actionType)">{{ log.actionType }}</span>
            </td >
            <td class="log-target">{{ log.target }}</td>
            <td class="log-details">{{ log.details }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="empty-row">查無符合條件的活動</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-dashboard-pagination
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
