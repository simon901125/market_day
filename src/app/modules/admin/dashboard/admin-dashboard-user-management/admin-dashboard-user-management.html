<section class="admin-user-management dashboard-list-page page-transition">
  <header class="app-page-header">
    <h1 class="app-page-title">使用者管理</h1>
  </header>

  <div class="app-filter-bar user-management-filter">
    <label class="app-search-field">
      <span class="app-control-title">使用者</span>
      <span class="app-search-input">
        <i class="bi bi-search"></i>
        <input
          type="search"
          placeholder="搜尋姓名/Email"
          [value]="searchKeyword"
          (input)="onSearchKeywordInput($event)"
          (keydown.enter)="onSearch()"
        />
      </span>
    </label>

    <app-dropdown
      #roleDropdown
      title="角色"
      placeholder="全部"
      [options]="roleOptions"
      (optionSelected)="onRoleSelected($event)"
    ></app-dropdown>

    <app-dropdown
      #statusDropdown
      title="狀態"
      placeholder="全部"
      [options]="userStatusOptions"
      (optionSelected)="onStatusSelected($event)"
    ></app-dropdown>

    <button type="button" class="app-btn search" (click)="onSearch()">
      <i class="bi bi-search"></i>
      <span>搜尋</span>
    </button>
  </div>
  <div class="result-section" #resultSection>
    <div class="table-wrapper dashboard-list-content" #tableWrapper>
      <table class="user-table">
        <thead>
          <tr>
            <th class="user-name">使用者名稱</th>
            <th class="user-email">Email</th>
            <th class="user-role">角色</th>
            <th class="user-cdate">註冊時間</th>
            <th class="user-ldate">最後登入</th>
            <th class="user-status">帳號狀態</th>
            <th class="action-btn">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.id) {
            <tr>
              <td class="user-name">{{ user.name }}</td>
              <td class="user-email">{{ user.email }}</td>
              <td class="user-role">
                <span class="role-tag" [class]="getRoleClass(user.role)">{{ user.role }}</span>
              </td>
              <td class="user-cdate">{{ user.createdAt }}</td>
              <td class="user-ldate">{{ user.lastLoginAt }}</td>
              <td class="user-status">
                <span class="status-tag" [class]="getStatusClass(user.status)">{{ user.status }}</span>
              </td>
              <td class="action-btn">
                  <button type="button" class="app-btn primary" (click)="getDetailHandler(user)()">查看</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="6" class="empty-row">查無符合條件的使用者</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>

  <app-dashboard-pagination
    class="dashboard-list-pagination"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
