<section class="admin-market-detail page-transition">
  <div class="page-header">
    <div class="header-left">
      <p class="breadcrumb">
        <span class="breadcrumb-link" (click)="goToList()">活動管理</span>
        <span class="breadcrumb-sep">＞</span>
        <span>活動詳情</span>
      </p>
      <div class="title-row">
        <button class="back-btn" type="button" (click)="goBack()">
          <i class="bi bi-arrow-left"></i>
        </button>
        <h1 class="page-title">活動詳情</h1>
      </div>
    </div>

    <div class="header-actions">
      @if (activity?.status === ActivityStatus.pendingReview) {
        <app-admin-dashboard-button type="secondary" text="要求補件" [todo]="onRequireSupplementHandler" />
        <app-admin-dashboard-button type="primary"   text="審核通過" [todo]="onApproveHandler" />
      } @else if (activity?.status === ActivityStatus.mapBuilding) {
        <app-admin-dashboard-button type="primary" text="地圖建置完成" [todo]="onMapBuildingDoneHandler" />
      }
    </div>
  </div>

  <!-- 卡片欄區塊（下次實作） -->
</section>
