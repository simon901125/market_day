<section class="admin-home page-transition">
  <header class="welcome-header">
    <h1 class="welcome-title">歡迎回來，管理員！👋</h1>
    <p class="welcome-subtitle">一起打造精彩的市集活動，讓好品牌被更多人看見！</p>
  </header>

  <section class="todo-section">
    <h2 class="section-title">待處理事項</h2>
    <div class="todo-cards">
      @for (item of todoItems; track item.label) {
        <app-dashboard-home-todo-card
          [icon]="item.icon"
          [count]="item.count"
          [unit]="item.unit"
          [label]="item.label"
          [path]="item.path"
          [queryParams]="item.queryParams"
          [iconColor]="item.iconColor ?? 'orange'"
        />
      }
    </div>
  </section>

  <section class="stats-section">
    <h2 class="section-title">平台概況</h2>
    <div class="stats-cards">
      @for (stat of platformStats; track stat.label) {
        <app-dashboard-home-todo-card
          [icon]="stat.icon"
          [count]="stat.value"
          [unit]="stat.unit"
          [label]="stat.label"
          [iconColor]="stat.iconColor ?? 'orange'"
        />
      }
    </div>
  </section>

  <app-dashboard-notification
    title="最新通知"
    [tabs]="tabs"
    [notifications]="notifications"
    [maxItems]="homeNotificationMaxItems"
    [limitItems]="true"
    [showTabs]="false"
    [showPagination]="false"
    viewAllLink="/admin/dash-board/notification"
    (markRead)="onMarkRead($event)"
  />
</section>
