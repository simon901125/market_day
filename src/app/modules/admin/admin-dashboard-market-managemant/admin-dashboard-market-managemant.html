<section class="admin-market-managemant page-transition">
  <h1 class="page-title">活動管理</h1>

  <div class="search-bar">
    <app-admin-dashboard-serch-input
      searchTitle="活動名稱"
      placeholder="請輸入活動名稱"
    ></app-admin-dashboard-serch-input>

    <app-admin-dashboard-dropdown
      #organizerDropdown
      title="主辦方"
      placeholder="全部"
      [options]="organizerOptions"
      (optionSelected)="onOrganizerSelected($event)"
    ></app-admin-dashboard-dropdown>

    <app-admin-dashboard-dropdown
      #statusDropdown
      title="狀態"
      placeholder="全部"
      [options]="statusOptions"
      (optionSelected)="onStatusSelected($event)"
    ></app-admin-dashboard-dropdown>

    <app-admin-dashboard-time-selector
      selectorTitle="活動日期"
    ></app-admin-dashboard-time-selector>

    <app-admin-dashboard-button type="search" [todo]="onSearchHandler"></app-admin-dashboard-button>
    <app-admin-dashboard-button type="clear" [todo]="onClearHandler"></app-admin-dashboard-button>
  </div>

  <div class="table-wrapper" #tableWrapper>
    <table class="activity-table">
      <thead>
        <tr>
          <th>活動名稱</th>
          <th>主辦方</th>
          <th>活動日期</th>
          <th>狀態</th>
          <th>建立時間</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        @for (activity of activities; track activity.id) {
          <tr>
            <td>
              <div class="activity-name-cell">
                <img [src]="activity.image" [alt]="activity.name" />
                <span>{{ activity.name }}</span>
              </div>
            </td>
            <td>{{ activity.organizer }}</td>
            <td class="activity-date">{{ activity.startDate }} ~ {{ activity.endDate }}</td>
            <td>
              <span class="status-tag" [class]="getStatusClass(activity.status)">{{ activity.status }}</span>
            </td>
            <td class="activity-cdate">{{ activity.createdAt }}</td>
            <td>
              @if (isReviewNeeded(activity.status)) {
                <app-admin-dashboard-button type="primary" text="審核" [todo]="getDetailHandler(activity)"></app-admin-dashboard-button>
              } @else {
                <app-admin-dashboard-button type="secondary" text="查看" [todo]="getDetailHandler(activity)"></app-admin-dashboard-button>
              }
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="6" class="empty-row">查無符合條件的活動</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <app-dashboard-pagination
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
