<form class="reset-form">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <p class="form-desc">請輸入新密碼並確認新密碼</p>

  <div class="form-group">
    <label>新密碼</label>

    <div class="input-box">
      <i class="bi bi-lock"></i>

      <input
        [type]="showNewPassword ? 'text' : 'password'"
        placeholder="請輸入新密碼"
        [(ngModel)]="newPassword"
        (ngModelChange)="checkPwRole(); checkPasswordMatch()"
        name="newPassword"
      />

      <button type="button" class="eye-btn" (click)="toggleNewPassword()">
        <i
          class="bi"
          [class.bi-eye]="!showNewPassword"
          [class.bi-eye-slash]="showNewPassword"
        ></i>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label>確認新密碼</label>

    <div class="input-box" [class.error]="passwordNotMatch">
      <i class="bi bi-lock"></i>

      <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        placeholder="請再次輸入新密碼"
        [(ngModel)]="confirmPassword"
        (ngModelChange)="checkPasswordMatch()"
        name="confirmPassword"
      />

      <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
        <i
          class="bi"
          [class.bi-eye]="!showConfirmPassword"
          [class.bi-eye-slash]="showConfirmPassword"
        ></i>
      </button>
    </div>

    @if (passwordNotMatch) {
      <p class="password-error">
        <i class="bi bi-x-circle"></i>
        兩次輸入的密碼不一致，請重新確認。
      </p>
    }
  </div>

  <div class="password-rule">
    <span>密碼需符合以下條件：</span>

    <span [class.valid]="isPasswordLengthValid">
      <i class="bi bi-check-circle"></i>
      至少 8 個字元
    </span>

    <span [class.valid]="isPasswordFormatValid">
      <i class="bi bi-check-circle"></i>
      包含英文字母與數字
    </span>
  </div>

  <button type="button" class="main-btn" (click)="resetPassword()">
    更新密碼
  </button>
</form>
