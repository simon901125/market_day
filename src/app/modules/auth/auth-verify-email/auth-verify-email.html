<section class="verify-card">
  <a [routerLink]="effectiveBackLink" class="back-link">
    <i class="bi bi-arrow-left"></i>
    返回註冊
  </a>

  <form class="verify-content" (ngSubmit)="verifyCode()">
    <i class="bi bi-envelope verify-icon"></i>

    <h2>{{ formTitle }}</h2>
    <div class="title-line"></div>

    <p class="verify-desc">
      我們已將 6 位數驗證碼寄送至
      <strong>{{ email }}</strong>
    </p>

    <p class="verify-note">有效時間為 10 分鐘，請儘快輸入。</p>

    <div class="code-inputs">
      @for (item of code; track $index; let i = $index) {
        <input
          #codeInput
          type="text"
          maxlength="1"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          [disabled]="isSubmitting"
          [ngModel]="code[i]"
          (ngModelChange)="onCodeInput($event, i)"
          (keydown.backspace)="onCodeBackspace(i)"
          (paste)="onCodePaste($event, i)"
        />
      }
    </div>

    <button
      type="submit"
      class="main-btn"
      [disabled]="isSubmitting || !isCodeComplete"
      (click)="verifyCode()"
    >
      {{ isSubmitting ? '驗證中...' : '確認驗證' }}
    </button>

    <button
      type="button"
      class="resend-btn"
      [disabled]="resendSeconds > 0"
      (click)="resendCode()"
    >
      <i class="bi bi-arrow-clockwise"></i>

      @if (resendSeconds > 0) {
        重新寄送驗證碼（{{ resendSeconds }} 秒後可重發）
      } @else {
        重新寄送驗證碼
      }
    </button>

    <p class="help-text">
      <i class="bi bi-question-circle"></i>
      沒有收到驗證碼？請檢查垃圾郵件，或點擊上方按鈕重新寄送。
    </p>
  </form>
</section>
