<form class="forgot-form">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <p class="form-desc">
    請輸入你的 Email，我們會寄送 6 位數驗證碼協助你重設密碼。
  </p>

  <div class="form-group">
    <label>Email</label>

    <div class="input-box">
      <i class="bi bi-envelope"></i>
      <input
        type="email"
        name="email"
        placeholder="請輸入 Email"
        [(ngModel)]="email"
      />
    </div>
  </div>

  <button type="button" class="main-btn" (click)="sendVerifyCode()">
    寄送驗證碼
  </button>

  <div class="divider">
    <span></span>
    <p>若沒有收到信件，請確認 Email 是否正確</p>
    <span></span>
  </div>
</form>
