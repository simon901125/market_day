<form class="forgot-form">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <p class="form-desc">
    請輸入註冊 Email，我們將寄送 6 位數驗證碼至你的信箱
  </p>

  <div class="form-group">
    <label>Email</label>

    <div class="input-box">
      <i class="bi bi-envelope"></i>
      <input
        type="email"
        name="email"
        placeholder="請輸入註冊 Email"
        [(ngModel)]="email"
      />
    </div>
  </div>

  <button type="button" class="main-btn" (click)="sendVerifyCode()" [routerLink]="vertifyLink">
    寄送驗證碼
  </button>

  <div class="divider">
    <span></span>
    <p>收不到信？重新確認 Email 是否正確</p>
    <span></span>
  </div>
</form>
