<form class="auth-register-form">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <div class="form-group">
    <label>負責人姓名</label>
    <div class="input-box">
      <i class="bi bi-person"></i>
      <input
        type="text"
        name="directorName"
        placeholder="請輸入負責人姓名"
        [(ngModel)]="directorName"
      />
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <div class="input-box">
      <i class="bi bi-envelope"></i>
      <input
        type="email"
        name="email"
        placeholder="請輸入 Email"
        [(ngModel)]="email"
      />
    </div>
  </div>

  <div class="form-group">
    <label>密碼</label>

    <div class="password-wrapper">
      <div class="input-box password-input">
        <i class="bi bi-lock"></i>

        <input
          name="password"
          [(ngModel)]="password"
          (ngModelChange)="checkPwRole(); checkPasswordMatch()"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="請設定密碼（至少 8 個字元）"
        />

        <button type="button" class="eye-btn" (click)="togglePassword()">
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword"
          ></i>
        </button>
      </div>

      <div class="password-rule">
        <span>密碼須符合以下條件：</span>

        <span [class.valid]="hasPwLenght">
          <i class="bi bi-check-circle"></i>
          至少 8 個字元
        </span>

        <span [class.valid]="hasPwNumLetter">
          <i class="bi bi-check-circle"></i>
          包含英文字母和數字
        </span>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>確認密碼</label>

    <div class="input-box" [class.error]="passwordNotMatch">
      <i class="bi bi-lock"></i>

      <input
        name="checkPw"
        [(ngModel)]="checkPw"
        (ngModelChange)="checkPasswordMatch()"
        [type]="showConfirmPassword ? 'text' : 'password'"
        placeholder="請再次輸入密碼"
      />

      <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
        <i
          class="bi"
          [class.bi-eye]="!showConfirmPassword"
          [class.bi-eye-slash]="showConfirmPassword"
        ></i>
      </button>
    </div>

    <p class="password-error" [class.show]="passwordNotMatch">
      <i class="bi bi-x-circle"></i>
      兩次輸入的密碼不一致，請重新確認。
    </p>
  </div>

  <button type="submit" class="main-btn">建立攤主帳號</button>

  <div class="divider">
    <span></span>
    <p>或使用以下方式快速註冊</p>
    <span></span>
  </div>

  <button type="button" class="google-btn">
    <img src="assets/images/shared/google-icon.png" alt="Google" />
    使用 Google 快速註冊
  </button>
</form>
