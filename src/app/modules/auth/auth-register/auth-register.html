<form class="auth-register-form" (ngSubmit)="register()">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <div class="form-group">
    <label>負責人姓名</label>
    <div class="input-box">
      <i class="bi bi-person"></i>
      <input
        type="text"
        name="directorName"
        placeholder="請輸入負責人姓名"
        [(ngModel)]="directorName"
      />
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <div class="input-box">
      <i class="bi bi-envelope"></i>
      <input
        type="email"
        name="email"
        placeholder="請輸入 Email"
        [(ngModel)]="email"
      />
    </div>
  </div>

  <div class="form-group">
    <label>密碼</label>

    <div class="password-wrapper">
      <div class="input-box password-input">
        <i class="bi bi-lock"></i>

        <input
          name="password"
          [(ngModel)]="password"
          (ngModelChange)="checkPwRole(); checkPasswordMatch()"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="請設定至少 8 碼密碼"
        />

        <button type="button" class="eye-btn" (click)="togglePassword()">
          <i
            class="bi"
            [class.bi-eye]="!showPassword"
            [class.bi-eye-slash]="showPassword"
          ></i>
        </button>
      </div>

      <div class="password-rule">
        <span>密碼需符合以下規則：</span>

        <span [class.valid]="hasPwLenght">
          <i class="bi bi-check-circle"></i>
          至少 8 碼
        </span>

        <span [class.valid]="hasPwNumLetter">
          <i class="bi bi-check-circle"></i>
          包含英文字母與數字
        </span>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>確認密碼</label>

    <div class="input-box" [class.error]="passwordNotMatch">
      <i class="bi bi-lock"></i>

      <input
        name="checkPw"
        [(ngModel)]="checkPw"
        (ngModelChange)="checkPasswordMatch()"
        [type]="showConfirmPassword ? 'text' : 'password'"
        placeholder="請再次輸入密碼"
      />

      <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
        <i
          class="bi"
          [class.bi-eye]="!showConfirmPassword"
          [class.bi-eye-slash]="showConfirmPassword"
        ></i>
      </button>
    </div>

    <p class="password-error" [class.show]="passwordNotMatch">
      <i class="bi bi-x-circle"></i>
      兩次輸入的密碼不一致，請重新確認。
    </p>
  </div>

  <button
    type="submit"
    class="main-btn"
    [disabled]="isSubmitting || isGoogleSubmitting"
  >
    {{ isSubmitting ? '註冊中...' : '建立帳號' }}
  </button>

  <div class="divider">
    <span></span>
    <p>也可以使用其他方式註冊</p>
    <span></span>
  </div>

  <button
    type="button"
    class="google-btn"
    [disabled]="isSubmitting || isGoogleSubmitting"
    (click)="registerWithGoogle()"
  >
    <img src="assets/images/shared/google-icon.png" alt="Google" />
    {{ isGoogleSubmitting ? 'Google 註冊中...' : '使用 Google 帳號註冊' }}
  </button>
</form>
