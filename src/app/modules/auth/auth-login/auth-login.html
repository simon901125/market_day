<form class="auth-login-form" (ngSubmit)="login()">
  <h2>{{ formTitle }}</h2>
  <div class="title-line"></div>

  <div class="form-group">
    <label>Email</label>
    <div class="input-box">
      <i class="bi bi-envelope"></i>
      <input
        type="email"
        name="email"
        placeholder="請輸入 Email"
        [(ngModel)]="email"
      />
    </div>
  </div>

  <div class="form-group">
    <label>密碼</label>
    <div class="input-box">
      <i class="bi bi-lock"></i>
      <input
        name="password"
        [(ngModel)]="password"
        [type]="showPassword ? 'text' : 'password'"
        placeholder="請輸入密碼"
      />

      <button type="button" class="eye-btn" (click)="togglePassword()">
        <i
          class="bi"
          [class.bi-eye]="showPassword"
          [class.bi-eye-slash]="!showPassword"
        ></i>
      </button>
    </div>

    <div class="forgot">
      <a [routerLink]="forgotLink">忘記密碼？</a>
    </div>
  </div>

  <button
    type="submit"
    class="main-btn"
    [disabled]="isSubmitting || isGoogleSubmitting"
  >
    {{ isSubmitting ? '登入中...' : '登入' }}
  </button>

  <div class="divider">
    <span></span>
    <p>也可以使用其他方式登入</p>
    <span></span>
  </div>

  <button
    type="button"
    class="google-btn"
    [disabled]="isSubmitting || isGoogleSubmitting"
    (click)="googleLogin()"
  >
    <img src="assets/images/shared/google-icon.png" alt="Google" />
    {{ isGoogleSubmitting ? 'Google 登入中...' : '使用 Google 帳號登入' }}
  </button>
</form>
