<aside class="dashboard-sidebar">
  <div class="brand">
    <img src="/assets/images/logo/logo-market-day-vendor.png" alt="小集日" />

    <!-- <div class="brand-text">
      <h1>小集日</h1>
      <p>Market Day</p>
    </div>

    <div class="divider"></div>

    <span class="backend-title">{{ backendTitle }}</span> -->
  </div>

  <nav class="menu">
    <a
      *ngFor="let item of menuItems"
      class="menu-item"
      [routerLink]="item.path"
      routerLinkActive="active"
    >
      <i class="bi" [class]="item.icon"></i>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <div class="user-box">
    <div class="user-avatar">
      {{ userInitial }}
    </div>

    <div class="user-info">
      <strong>{{ userName }}</strong>
      <span>{{ userEmail }}</span>
    </div>

    <i class="bi bi-chevron-down"></i>
  </div>
</aside>
