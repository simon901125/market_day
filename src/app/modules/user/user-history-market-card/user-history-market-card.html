<article class="history-card">
  <div class="history-image">
    <img [src]="market.image" [alt]="market.title" />
  </div>

  <div class="history-content">
    <div class="history-meta">
      <span><i class="bi bi-bezier2"></i>{{ market.category }}</span>
      <span><i class="bi bi-geo-alt-fill"></i>{{ market.city }}</span>
      <span><i class="bi bi-geo-alt-fill"></i>{{ market.area }}</span>
    </div>

    <h3>{{ market.title }}</h3>

    <p>{{ market.desc }}</p>

    <div class="history-bottom">
      <span class="history-date">
        <i class="bi bi-calendar3"></i>
        {{ market.date }}
      </span>

      <span class="ended-label">已結束</span>
    </div>
  </div>
</article>
