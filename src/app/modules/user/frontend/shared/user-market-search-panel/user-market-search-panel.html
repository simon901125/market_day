<section class="app-filter-bar market-search-panel">
  <label class="app-search-field keyword-input">
    <span class="app-control-title">活動名稱</span>
    <span class="app-search-input">
      <i class="bi bi-search"></i>
      <input
        type="text"
        placeholder="請輸入活動名稱或關鍵字"
        [value]="keyword"
        (input)="onKeywordInput($event)"
      />
    </span>
  </label>

  <app-dropdown
    title="縣市"
    [options]="cityOptions"
    placeholder="選擇縣市"
    iconClass="bi bi-geo-alt-fill"
    [selectedValue]="selectedCity"
    (optionSelected)="selectCity($event)"
  ></app-dropdown>

  <app-dropdown
    title="狀態"
    [options]="statusOptions"
    placeholder="選擇狀態"
    [selectedValue]="selectedStatus"
    (optionSelected)="selectStatus($event)"
  ></app-dropdown>

  <app-date-range-selector
    [title]="dateRangeTitle"
    [startDate]="startDate"
    [endDate]="endDate"
    (dateRangeChange)="onDateRangeChange($event)"
  ></app-date-range-selector>

  <button class="app-btn search" type="button" (click)="search()">
    搜尋
  </button>

  <div class="category-scroll-wrap">
    <div class="category-tags">
      @for (category of categories; track $index; let i = $index;) {
        <button
          class="category-tag"
          [class.active]="category.name === selectedCategory"
          type="button"
          (click)="selectCategory(i)"
        >
          <i [class]="category.icon"></i>
          <span>{{ category.name }}</span>
        </button>
      }
    </div>
  </div>
</section>
