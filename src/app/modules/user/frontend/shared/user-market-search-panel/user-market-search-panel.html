<section class="search-panel">
  <div class="search-row">
    <div class="search-input keyword-input">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="搜尋市集名稱、地點或關鍵字" />
    </div>

    <div class="search-input date-input">
      <i class="bi bi-calendar3"></i>
      <input type="text" placeholder="起始日" />
    </div>

    <div class="search-input date-input">
      <i class="bi bi-calendar3"></i>
      <input type="text" placeholder="結束日" />
    </div>

    <app-user-dropdown
      [options]="cityOptions"
      placeholder="全部縣市"
      iconClass="bi bi-geo-alt-fill"
      (optionSelected)="selectCity($event)">
    </app-user-dropdown>

    <app-user-dropdown
      [options]="statusOptions"
      placeholder="全部狀態"
      (optionSelected)="selectStatus($event)">
    </app-user-dropdown>
    
    <button class="search-btn" type="button" routerLink="/user/activity-list">
      搜尋
    </button>
  </div>

  <div class="category-scroll-wrap">
    <div class="category-tags">
      @for (category of categories; track $index; let i = $index;) {
        <button
          class="category-tag"
          [class.active]="category.active"
          type="button"
          (click)="selectCategory(i)"
        >
          <i [class]="category.icon"></i>
          <span>{{ category.name }}</span>
        </button>
      }
    </div>
  </div>
</section>
