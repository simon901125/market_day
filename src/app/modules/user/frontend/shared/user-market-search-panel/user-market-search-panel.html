<section class="app-filter-bar market-search-panel">
  <label class="app-search-field keyword-input">
    <span class="app-control-title">關鍵字</span>
    <span class="app-search-input">
      <i class="bi bi-search"></i>
      <input type="text" placeholder="搜尋市集名稱、地點或關鍵字" />
    </span>
  </label>

  <app-dropdown
    title="縣市"
    [options]="cityOptions"
    placeholder="全部縣市"
    iconClass="bi bi-geo-alt-fill"
    (optionSelected)="selectCity($event)"
  ></app-dropdown>

  <app-dropdown
    title="狀態"
    [options]="statusOptions"
    placeholder="全部狀態"
    (optionSelected)="selectStatus($event)"
  ></app-dropdown>

  <app-date-range-selector [title]="dateRangeTitle"></app-date-range-selector>

  <button class="app-btn search" type="button" routerLink="/user/activity-list">
    搜尋
  </button>

  <div class="category-scroll-wrap">
    <div class="category-tags">
      @for (category of categories; track $index; let i = $index;) {
        <button
          class="category-tag"
          [class.active]="category.active"
          type="button"
          (click)="selectCategory(i)"
        >
          <i [class]="category.icon"></i>
          <span>{{ category.name }}</span>
        </button>
      }
    </div>
  </div>
</section>
