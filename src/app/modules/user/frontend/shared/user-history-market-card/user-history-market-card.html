<article class="history-card">
  <div class="history-image">
    <img [src]="market.image" [alt]="market.title" />
  </div>

  <div class="history-content">
    <div class="history-top">
      <div class="history-meta">
        <div class="history-meta-main">
          <span class="category-tag">
            {{ market.category }}
          </span>

          <span class="city-tag">
            <i class="bi bi-geo-alt-fill"></i>
            {{ market.city }} {{ market.area }}
          </span>
        </div>

        <span class="place-tag">
          <i class="bi bi-building-fill"></i>
          {{ venueName }}
        </span>
      </div>

      <span class="ended-label" [class]="market.statusClass">
        {{ market.status }}
      </span>
    </div>

    <div class="history-main">
      <h3>{{ market.title }}</h3>
      <p>{{ market.description }}</p>
    </div>

    <div class="history-bottom">
      <div class="history-schedule">
        <span class="history-address">
          <i class="bi bi-map-fill"></i>
          {{ market.address }}
        </span>

        <span class="history-date">
          <i class="bi bi-calendar3"></i>
          {{ market.start_date }} - {{ market.end_date }}
        </span>
      </div>

      <span class="detail-link">
        查看詳情
        <i class="bi bi-arrow-right"></i>
      </span>
    </div>
  </div>
</article>
