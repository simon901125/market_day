<div class="activity-page">
  <section class="activity-hero">
    <div class="hero-text">
      <h1>市集活動</h1>
      <p>
        探索近期開放與即將登場的市集，<br />
        也可以回顧過去留下的美好活動紀錄。
      </p>
    </div>
  </section>

  <section class="activity-content">
    <div class="activity-tabs">
      <button
        type="button"
        [class.active]="activeTab === 'current'"
        (click)="changeTab('current')"
      >
        目前活動
      </button>

      <button
        type="button"
        [class.active]="activeTab === 'history'"
        (click)="changeTab('history')"
      >
        歷史活動
      </button>
    </div>

    @if (activeTab === 'current') {
      <app-user-market-search-panel></app-user-market-search-panel>

      <div class="market-grid">
        @for (market of pagedMarkets; track market.title) {
          <app-user-market-card
            [market]="market"
            (click)="goToActivityDetail(market)"
          ></app-user-market-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="markets.length"
        (pageChange)="changePage($event)">
      </app-pagination>
    } @else {
      <div class="history-header">
        <h2>共 12 場歷史市集</h2>
      </div>

      <div class="history-list">
        @for (market of historyMarkets; track market.title) {
          <app-user-history-market-card
            [market]="market"
            (click)="goToActivityHistory(market)"
          ></app-user-history-market-card>
        }
      </div>
    }
  </section>
</div>
