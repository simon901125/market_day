<div class="activity-page user-frontend-page user-list-page">
  <section class="activity-hero">
    <div class="hero-text">
      <h1>市集活動</h1>
      <p>
        找到適合週末散步、親子同遊或風格選物的市集，讓生活多一點剛好的熱鬧。
      </p>
    </div>
  </section>

  <section class="activity-content">
    <div class="activity-tabs">
      <button
        type="button"
        [class.active]="activeTab === 'current'"
        (click)="changeTab('current')"
      >
        近期活動
      </button>

      <button
        type="button"
        [class.active]="activeTab === 'history'"
        (click)="changeTab('history')"
      >
        歷史活動
      </button>
    </div>

    @if (activeTab === 'current') {
      <app-user-market-search-panel
        dateRangeTitle="活動日期"
        [keyword]="keyword"
        [selectedCity]="selectedCity"
        [selectedStatus]="selectedStatus"
        [selectedCategory]="selectedCategory"
        [startDate]="startDate"
        [endDate]="endDate"
      ></app-user-market-search-panel>

      <div class="market-grid">
        @for (market of pagedMarkets; track market.id) {
          <app-user-market-card
            [market]="market"
            (click)="goToActivityDetail(market)"
          ></app-user-market-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="markets.length"
        (pageChange)="changePage($event)">
      </app-pagination>
    } @else {
      <div class="history-list">
        @for (market of pagedHistoryMarkets; track market.id) {
          <app-user-history-market-card
            [market]="market"
            (click)="goToActivityDetail(market)"
          ></app-user-history-market-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="historyMarkets.length"
        (pageChange)="changePage($event)">
      </app-pagination>
    }
  </section>
</div>
