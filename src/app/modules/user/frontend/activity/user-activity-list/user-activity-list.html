<div class="activity-page">
  <section class="activity-hero">
    <div class="hero-text">
      <h1>市集活動</h1>
      <p>
        精選小集日推薦的生活市集，從週末散步、親子同遊到風格選物，
        找到最適合你的下一場小日子。
      </p>
    </div>
  </section>

  <section class="activity-content">
    <div class="activity-tabs">
      <button
        type="button"
        [class.active]="activeTab === 'current'"
        (click)="changeTab('current')"
      >
        目前活動
      </button>

      <button
        type="button"
        [class.active]="activeTab === 'history'"
        (click)="changeTab('history')"
      >
        歷史活動
      </button>
    </div>

    @if (activeTab === 'current') {
      <app-user-market-search-panel dateRangeTitle="活動日期"></app-user-market-search-panel>

      <div class="market-grid">
        @for (market of pagedMarkets; track market.title) {
          <app-user-market-card
            [market]="market"
            (click)="goToActivityDetail(market)"
          ></app-user-market-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="markets.length"
        (pageChange)="changePage($event)">
      </app-pagination>
    } @else {
      <div class="history-list">
        @for (market of pagedHistoryMarkets; track market.title) {
          <app-user-history-market-card
            [market]="market"
            (click)="goToActivityDetail(market)"
          ></app-user-history-market-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="historyMarkets.length"
        (pageChange)="changePage($event)">
      </app-pagination>
    }
  </section>
</div>
