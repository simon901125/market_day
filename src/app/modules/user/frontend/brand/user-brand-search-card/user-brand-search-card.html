<article class="brand-card" (click)="$event.preventDefault(); onCardClick()">
  <div class="brand-imgs">
    <div class="brand-img">
      <img [src]="brand.image" [alt]="brand.name" />
    </div>
    <div class="brand-logo">
      <div>
        <img [src]="brand.logo" [alt]="brand.name" />
      </div>
    </div>
  </div>

  <div class="brand-body">
    <div class="brand-name-row">
      <h3 class="brand-name">{{ brand.name }}</h3>
      <div class="tag-list">
        @for (tag of brand.tags; track $index) {
          <span>{{ tag }}</span>
        }
      </div>
    </div>

    <p class="brand-desc">{{ brand.description }}</p>

    <div class="brand-work-row">
      <span class="work-label">擅長作品：</span>
      <span class="work-value">{{ representativeProducts }}</span>
    </div>

    <span class="brand-link">
      查看品牌 <i class="bi bi-arrow-right"></i>
    </span>
  </div>
</article>
