<div class="brandserch-page user-frontend-page user-list-page">
  <section class="brandserch-hero">
    <div class="hero-content">
      <h1>品牌探索</h1>
      <p>認識出現在市集裡的風格品牌，從作品、故事到參與紀錄，一次看清楚。</p>
    </div>
  </section>

  <section class="brand-filter-panel">
    <div class="filter-inner">
      <div class="app-filter-bar brand-search-row">
        <label class="app-search-field">
          <span class="app-control-title">品牌名稱</span>
          <span class="app-search-input">
            <i class="bi bi-search"></i>
            <input
              type="text"
              placeholder="請輸入品牌名稱或關鍵字"
              [value]="keyword"
              (input)="onKeywordInput($event)"
              (keyup.enter)="search()"
            />
          </span>
        </label>

        <div class="filter-actions">
          <app-dropdown
            title="品牌類型"
            [options]="brandTypeOptions"
            placeholder="選擇類型"
            [selectedValue]="selectedCategory || '全部類型'"
            (optionSelected)="onCategorySelected($event)"
          ></app-dropdown>

          <app-dropdown
            title="參與市集"
            [options]="marketOptions"
            placeholder="選擇市集"
            [selectedValue]="selectedMarket || '全部市集'"
            (optionSelected)="onMarketSelected($event)"
          ></app-dropdown>
        </div>

        <button class="app-btn search" type="button" (click)="search()">
          搜尋
        </button>
      </div>
    </div>
  </section>

  <section class="brand-section">
    <div class="brand-inner">
      <div class="brand-section-title">
        <div>
          <h4>精選品牌</h4>
          <p>看看這些品牌如何把作品帶進市集，也把故事帶到人群之中。</p>
        </div>
      </div>

      @if (!isLoading && pagedBrands.length === 0) {
        <div class="user-empty-state" role="status">
          <i class="bi bi-shop" aria-hidden="true"></i>
          <h3>目前沒有品牌</h3>
          <p>目前沒有符合條件的品牌，請調整搜尋條件後再試。</p>
        </div>
      } @else {
        <div class="brand-grid">
          @for (brand of pagedBrands; track brand.id) {
            <app-user-brandserch-card
              [brand]="brand"
              (cardClick)="goToBrandDetail($event)"
            ></app-user-brandserch-card>
          }
        </div>

        @if (totalItems > 0) {
          <app-pagination
            [currentPage]="currentPage"
            [pageSize]="pageSize"
            [totalItems]="totalItems"
            (pageChange)="onPageChange($event)"
          ></app-pagination>
        }
      }
    </div>
  </section>
</div>
