<div class="brandserch-page">
  <section class="brandserch-hero">
    <div class="hero-content">
      <h1>品牌探索</h1>
      <p>探索小集日精心挑選的市集品牌，認識他們的故事與作品。</p>
    </div>
  </section>

  <section class="filter-panel">
    <div class="filter-inner">
      <div class="filter-top">
        <div class="search-input">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="搜尋品牌名稱、關鍵字" />
        </div>

        <div class="filter-actions">
          <app-user-dropdown
            [options]="brandTypeOptions"
            placeholder="品牌類型">
          </app-user-dropdown>

          <app-user-dropdown
            [options]="marketOptions"
            placeholder="參與市集">
          </app-user-dropdown>
        </div>

        <button class="search-btn" type="button">
          搜尋
        </button>
      </div>
    </div>
  </section>

  <section class="brand-section">
    <div class="brand-inner">
      <div class="brand-section-title">
        <div>
          <h4>探索品牌</h4>
          <p>發掘參與小集日市集的優質品牌</p>
        </div>
      </div>

      <div class="brand-grid">
        @for (brand of pagedBrands; track $index) {
          <app-user-brandserch-card
            [brand]="brand"
            (cardClick)="goToBrandDetail($event)">
          </app-user-brandserch-card>
        }
      </div>

      <app-pagination
        [currentPage]="currentPage"
        [pageSize]="pageSize"
        [totalItems]="brands.length"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    </div>
  </section>
</div>
