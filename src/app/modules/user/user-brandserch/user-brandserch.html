<div class="brandserch-page">

  <!-- Hero Banner -->
  <section class="brandserch-hero">
    <div class="hero-content">
      <h1>品牌探索</h1>
      <p>探索小集日精心挑選的市集品牌，認識他們的故事與作品。</p>
    </div>
  </section>

  <!-- Filter Panel -->
  <section class="filter-panel">
    <div class="filter-inner">
      <div class="filter-top">
        <div class="search-input">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="搜尋品牌名稱、關鍵字" />
        </div>
        <div class="filter-actions">
          <div class="select-wrapper">
            <button class="select-btn" type="button" (click)="toggleBrandType()">
              <span>{{ selectedBrandType }}</span>
              <i class="bi bi-chevron-down"></i>
            </button>
            <app-user-brandserch-dropdown
              [options]="brandTypeOptions"
              [isOpen]="isBrandTypeOpen"
              (optionSelected)="onBrandTypeSelected($event)"
              (closed)="isBrandTypeOpen = false">
            </app-user-brandserch-dropdown>
          </div>
          <div class="select-wrapper">
            <button class="select-btn" type="button" (click)="toggleMarket()">
              <span>{{ selectedMarket }}</span>
              <i class="bi bi-chevron-down"></i>
            </button>
            <app-user-brandserch-dropdown
              [options]="marketOptions"
              [isOpen]="isMarketOpen"
              (optionSelected)="onMarketSelected($event)"
              (closed)="isMarketOpen = false">
            </app-user-brandserch-dropdown>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Brand Grid -->
  <section class="brand-section">
    <div class="brand-inner">
      <p class="result-count">共 {{ brands.length }} 個品牌</p>

      <div class="brand-grid">
        @for (brand of brands; track $index) {
          <app-user-brandserch-card [brand]="brand"></app-user-brandserch-card>
        }
      </div>

      <!-- Pagination -->
      <div class="pagination">
        <button class="page-btn" type="button">
          <i class="bi bi-chevron-left"></i>
        </button>
        <button class="page-btn active" type="button">1</button>
        <button class="page-btn" type="button">2</button>
        <button class="page-btn" type="button">3</button>
        <button class="page-btn" type="button">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </section>

</div>
