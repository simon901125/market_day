<app-vendor-sidebar
  title="加入小集日，&#10;開啟你的"
  highlight="市集旅程"
  description="建立攤主帳號，開始參與市集活動，&#10;讓更多人看見你的品牌與好物。"
  topText="已經有帳號了？"
  topLinkText="前往登入"
  topLink="/vendor/login"
>
  <form class="auth-form">
    <h2>攤主註冊</h2>
    <div class="title-line"></div>

    <div class="form-group">
      <label>負責人姓名</label>
      <div class="input-box">
        <i class="bi bi-person"></i>
        <input type="text" placeholder="請輸入負責人姓名" />
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-box">
        <i class="bi bi-envelope"></i>
        <input type="email" placeholder="請輸入 Email" />
      </div>
    </div>

    <div class="form-group">
      <label>密碼</label>

      <div class="password-wrapper">
        <div class="input-box no-border-bottom">
          <i class="bi bi-lock"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="請設定密碼（至少 8 個字元）"
          />
          <button type="button" class="eye-btn" (click)="togglePassword()">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>

        <div class="password-rule">
          <p>密碼須符合以下條件：</p>
          <span><i class="bi bi-check-circle"></i> 至少 8 個字元</span>
          <span><i class="bi bi-check-circle"></i> 包含英文字母和數字</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>確認密碼</label>
      <div class="input-box">
        <i class="bi bi-lock"></i>
        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="請再次輸入密碼（至少 8 個字元）"
        />
        <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
          <i class="bi" [class.bi-eye]="!showConfirmPassword" [class.bi-eye-slash]="showConfirmPassword"></i>
        </button>
      </div>
    </div>

    <button type="submit" class="main-btn">建立攤主帳號</button>

    <div class="divider">
      <span></span>
      <p>或使用以下方式快速註冊</p>
      <span></span>
    </div>

    <button type="button" class="google-btn">
      <img src="assets/images/Google_Favicon_2025.png" alt="Google" />
      使用 Google 快速註冊
    </button>

    <p class="policy">
      註冊即代表你同意
      <a href="#">小集日服務條款</a>
      與
      <a href="#">隱私權政策</a>
    </p>
  </form>
</app-vendor-sidebar>
