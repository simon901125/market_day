<header class="organizer-header">
  <div class="header-inner">
    <a routerLink="/vendor/home" class="brand" (click)="closeMenu()">
      <img src="/assets/images/logo/logo-market-day-vendor.png" alt="小集日 Market Day" routerLink="/vendor/home"/>
      <span>攤主專區</span>
    </a>

    <button type="button" class="menu-btn" (click)="toggleMenu()">
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>

    <nav class="nav-links" [class.open]="isMenuOpen">
      <a
        routerLink="/vendor/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        首頁
      </a>

      <a routerLink="/vendor/sign-up" routerLinkActive="active" (click)="closeMenu()">
        市集報名
      </a>

      <a routerLink="/vendor/dashboard" routerLinkActive="active" (click)="closeMenu()">
        攤主後台
      </a>

      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">
        關於我們
      </a>
    </nav>

    <div class="header-actions" [class.open]="isMenuOpen">
      <a routerLink="/vendor/login" class="login-btn" (click)="closeMenu()">登入</a>
      <a routerLink="/vendor/register" class="register-btn" (click)="closeMenu()">註冊</a>
    </div>
  </div>
</header>
