<header class="vendor-header">
  <div class="vendor-header-inner">
    <button
      type="button"
      class="vendor-menu-btn"
      aria-label="開啟攤主導覽選單"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="vendor-mobile-menu"
      (click)="toggleMenu()"
    >
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>

    <a routerLink="/vendor/home" class="vendor-brand" (click)="closeMenu()">
      <img src="/assets/images/logo/logo-market-day-vendor-zone.png" alt="小集日攤主專區" routerLink="/vendor/home" />
    </a>

    <nav class="vendor-nav-links" aria-label="攤主導覽">
      <a routerLink="/user/home" routerLinkActive="active" (click)="closeMenu()">
        回小集日首頁
      </a>

      <a
        routerLink="/vendor/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        首頁
      </a>

      <a routerLink="/vendor/sign-up" [class.active]="isSignupSection" (click)="closeMenu()">
        市集報名
      </a>

      @if (isLoggedIn) {
      <a
        [href]="vendorDashboardUrl"
        target="_blank"
        rel="noopener noreferrer"
        (click)="closeMenu()"
      >
        攤主後台
      </a>
      }

      <a routerLink="/vendor/about" routerLinkActive="active" (click)="closeMenu()">
        關於我們
      </a>
    </nav>

    <div class="vendor-header-actions">
      @if (isLoggedIn && user) {
        <span class="vendor-account-name">
          <i class="bi bi-person-circle"></i>
          {{ user.name }}
        </span>
        <button type="button" class="vendor-logout-btn" [disabled]="isLoggingOut" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          登出
        </button>
      } @else {
        <a href="/vendor/login" target="_blank" rel="noopener noreferrer" class="vendor-login-btn" (click)="closeMenu()">登入</a>
        <a href="/vendor/register" target="_blank" rel="noopener noreferrer" class="vendor-register-btn" (click)="closeMenu()">註冊</a>
      }
    </div>
  </div>
</header>

<button
  class="vendor-menu-backdrop"
  type="button"
  aria-label="關閉攤主導覽選單"
  [class.open]="isMenuOpen"
  (click)="closeMenu()"
></button>

<aside
  id="vendor-mobile-menu"
  class="vendor-mobile-drawer"
  [class.open]="isMenuOpen"
  [attr.aria-hidden]="!isMenuOpen"
>
  <div class="vendor-drawer-header">
    <div class="vendor-drawer-brand">
      <img src="/assets/images/logo/logo-market-day-vendor-zone.png" alt="小集日攤主專區" />
    </div>
    <button type="button" aria-label="關閉攤主導覽選單" (click)="closeMenu()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <nav aria-label="手機攤主導覽">
    <a routerLink="/user/home" routerLinkActive="active">回小集日首頁</a>
    <a routerLink="/vendor/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">首頁</a>
    <a routerLink="/vendor/sign-up" [class.active]="isSignupSection">市集報名</a>
    @if (isLoggedIn) {
    <a
      [href]="vendorDashboardUrl"
      target="_blank"
      rel="noopener noreferrer"
      (click)="closeMenu()"
    >
      攤主後台
    </a>
    }
    <a routerLink="/vendor/about" routerLinkActive="active">關於我們</a>
  </nav>

  <div class="vendor-drawer-actions">
    @if (isLoggedIn && user) {
      <span class="vendor-account-name">
        <i class="bi bi-person-circle"></i>
        {{ user.name }}
      </span>
      <button type="button" class="vendor-logout-btn" [disabled]="isLoggingOut" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        登出
      </button>
    } @else {
      <a href="/vendor/login" target="_blank" rel="noopener noreferrer" class="vendor-login-btn">登入</a>
      <a href="/vendor/register" target="_blank" rel="noopener noreferrer" class="vendor-register-btn">註冊</a>
    }
  </div>
</aside>
