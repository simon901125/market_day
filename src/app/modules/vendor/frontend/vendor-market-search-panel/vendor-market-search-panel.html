<section class="app-filter-bar market-search-panel">
  <label class="app-search-field keyword-input">
    <span class="app-control-title">活動名稱</span>
    <span class="app-search-input">
      <i class="bi bi-search"></i>
      <input
        type="text"
        placeholder="請輸入活動名稱或關鍵字"
        [value]="keyword"
        (input)="onKeywordInput($event)"
        (keydown.enter)="submitSearch()"
      />
    </span>
  </label>

  <app-dropdown
    title="區域"
    [options]="areaOptions"
    [placeholder]="areaPlaceholder"
    iconClass="bi bi-geo-alt-fill"
    [selectedValue]="selectedArea"
    (optionSelected)="selectArea($event)"
  ></app-dropdown>

  <app-date-range-selector
    title="活動日期"
    [startDate]="startDate"
    [endDate]="endDate"
    (dateRangeChange)="onDateRangeChange($event)"
  ></app-date-range-selector>

  <app-dropdown
    title="縣市"
    [options]="cityOptions"
    [placeholder]="cityPlaceholder"
    [selectedValue]="selectedCity"
    (optionSelected)="selectCity($event)"
  ></app-dropdown>

  <app-dropdown
    title="活動狀態"
    [options]="statusOptions"
    placeholder="全部狀態"
    [selectedValue]="selectedStatus"
    (optionSelected)="selectStatus($event)"
  ></app-dropdown>

  <button class="app-btn search" type="button" (click)="submitSearch()">
    搜尋
  </button>
</section>
