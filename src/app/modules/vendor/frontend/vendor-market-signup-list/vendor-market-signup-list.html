<app-vendor-header></app-vendor-header>

<main class="market-signup-page">
  <section class="page-heading">
    <h1>市集報名</h1>
    <p>瀏覽近期開放報名的市集，依照品牌類型、活動日期與地區找到適合的場次。</p>
  </section>

  <app-vendor-market-search-panel></app-vendor-market-search-panel>

  <section class="market-grid">
    <div class="row g-4">
      @for (market of pagedMarkets; track market.title) {
        <div class="col-12 col-md-6 col-lg-4">
          <app-vendor-market-card 
          [market]="market"
          (click)="goToSignUpDetail(market)"
          ></app-vendor-market-card>
        </div>
      }
    </div>
  </section>

  <div class="pagination-section">
    <app-pagination
      [currentPage]="currentPage"
      [pageSize]="pageSize"
      [totalItems]="filteredMarkets.length"
      (pageChange)="setPage($event)"
    ></app-pagination>
  </div>
</main>

<app-user-footer></app-user-footer>
