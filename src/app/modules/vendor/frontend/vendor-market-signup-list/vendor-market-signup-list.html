<app-vendor-header></app-vendor-header>

<main class="market-signup-page frontend-page vendor-frontend-page">
  <section class="page-heading">
    <div class="page-heading-content">
      <h1>市集報名</h1>
      <p>瀏覽近期開放報名的市集，依照品牌類型、活動日期與地區找到適合的場次。</p>
    </div>
  </section>

  <app-vendor-market-search-panel
    (search)="onSearch($event)"
  ></app-vendor-market-search-panel>

  

  <section class="market-grid">
    @if (isLoading) {
      <p class="market-message">活動載入中...</p>
    } @else if (loadError) {
      <p class="market-message market-message-error">{{ loadError }}</p>
    } @else if (markets.length === 0) {
      <p class="market-message">查無符合條件的活動。</p>
    }

    <div class="row g-4">
      @for (market of markets; track market.id) {
        <div class="col-12 col-md-6 col-lg-4">
          <app-vendor-market-card 
          [market]="market"
          (click)="goToSignUpDetail(market)"
          ></app-vendor-market-card>
        </div>
      }
    </div>
  </section>

  <div class="pagination-section">
    <app-pagination
      [currentPage]="currentPage"
      [pageSize]="pageSize"
      [totalItems]="totalItems"
      (pageChange)="setPage($event)"
    ></app-pagination>
  </div>
</main>

<app-user-footer></app-user-footer>
