<app-vendor-sidebar
  title="重新設定密碼"
  description="請輸入新密碼並確認新密碼，&#10;完成後即可重新登入攤主平台。"
  topText="想起密碼了？"
  topLinkText="返回登入"
  topLink="/vendor/login"
>
  <form class="reset-form">
    <h2>重設密碼</h2>
    <div class="title-line"></div>

    <p class="form-desc">請輸入新密碼並確認新密碼</p>

    <div class="form-group">
      <label>新密碼</label>

      <div class="input-box">
        <i class="bi bi-lock"></i>

        <input
          [type]="showNewPassword ? 'text' : 'password'"
          placeholder="請輸入新密碼"
          [(ngModel)]="newPassword"
          name="newPassword"
        />

        <button type="button" class="eye-btn" (click)="toggleNewPassword()">
          <i
            class="bi"
            [class.bi-eye]="!showNewPassword"
            [class.bi-eye-slash]="showNewPassword"
          ></i>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>確認新密碼</label>

      <div class="input-box">
        <i class="bi bi-lock"></i>

        <input
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="請再次輸入新密碼"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
        />

        <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
          <i
            class="bi"
            [class.bi-eye]="!showConfirmPassword"
            [class.bi-eye-slash]="showConfirmPassword"
          ></i>
        </button>
      </div>
    </div>

    <div class="password-rule">
      <p>密碼需符合以下條件：</p>

      <span [class.valid]="isPasswordLengthValid">
        <i class="bi bi-check-circle"></i>
        至少 8 個字元
      </span>

      <span [class.valid]="isPasswordFormatValid">
        <i class="bi bi-check-circle"></i>
        包含英文字母與數字
      </span>
    </div>

    <button type="button" class="main-btn" (click)="resetPassword()">
      更新密碼
    </button>
  </form>
</app-vendor-sidebar>

@if (showSuccessModal) {
  <div class="modal-backdrop">
    <div class="result-modal">
      <div class="result-icon success">
        <i class="bi bi-check-lg"></i>
      </div>

      <h3>密碼重設成功</h3>

      <p>
        你的密碼已更新完成，<br />
        現在可以返回登入並使用新密碼登入。
      </p>

      <a routerLink="/vendor/login" class="modal-btn">
        前往登入
      </a>
    </div>
  </div>
}
