<section class="password-settings-page">
  <div class="page-preview" aria-hidden="true">
    <div>
      <h1>歡迎回來，董映彤！</h1>
      <p>這裡幫你整理近期需要處理的報名與通知。</p>
    </div>
  </div>

  <div class="account-overlay">
    <article class="account-modal account-modal-backdrop" aria-hidden="true">
      <header class="modal-header">
        <h2>帳號設定</h2>
        <i class="bi bi-x-lg"></i>
      </header>

      <div class="setting-card account-card">
        <i class="bi bi-wallet2"></i>
        <div>
          <h3>基本帳號資料</h3>
          <p>負責人姓名：董映彤</p>
          <p>Email：yingtung0909@gmail.com</p>
        </div>
      </div>

      <div class="setting-card compact">
        <i class="bi bi-lock"></i>
        <div>
          <h3>修改密碼</h3>
          <p>{{ passwordRule }}</p>
        </div>
        <span>修改密碼</span>
      </div>

      <div class="setting-card compact">
        <i class="bi bi-exclamation-triangle"></i>
        <div>
          <h3>申請註銷帳號</h3>
          <p>若有活動正在進行中，將無法註銷帳號。</p>
        </div>
        <span>申請註銷帳號</span>
      </div>
    </article>

    <article class="password-modal" role="dialog" aria-modal="true" aria-labelledby="passwordSettingsTitle">
      <header class="password-header">
        <div class="title-wrap">
          <i class="bi bi-lock"></i>
          <h2 id="passwordSettingsTitle">修改密碼</h2>
        </div>

        <button type="button" class="icon-btn" aria-label="關閉修改密碼" (click)="close()">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <p class="description">為了保護帳號安全，請輸入目前密碼並設定新密碼。</p>

      <form class="password-form" (ngSubmit)="save()">
        <!-- 使用 ngModel 雙向綁定欄位，後續串接 API 時可直接送出 passwordForm。 -->
        <label class="field-group">
          <span>目前密碼</span>
          <div class="password-input">
            <input
              [type]="visible.currentPassword ? 'text' : 'password'"
              name="currentPassword"
              placeholder="請輸入目前密碼"
              [(ngModel)]="passwordForm.currentPassword"
            />
            <button type="button" aria-label="顯示目前密碼" (click)="toggleVisible('currentPassword')">
              <i class="bi" [class.bi-eye]="!visible.currentPassword" [class.bi-eye-slash]="visible.currentPassword"></i>
            </button>
          </div>
        </label>

        <label class="field-group">
          <span>新密碼</span>
          <div class="password-input">
            <input
              [type]="visible.newPassword ? 'text' : 'password'"
              name="newPassword"
              placeholder="請輸入新密碼"
              [(ngModel)]="passwordForm.newPassword"
            />
            <button type="button" aria-label="顯示新密碼" (click)="toggleVisible('newPassword')">
              <i class="bi" [class.bi-eye]="!visible.newPassword" [class.bi-eye-slash]="visible.newPassword"></i>
            </button>
          </div>
        </label>

        <label class="field-group">
          <span>確認新密碼</span>
          <div class="password-input">
            <input
              [type]="visible.confirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              placeholder="請再次輸入新密碼"
              [(ngModel)]="passwordForm.confirmPassword"
            />
            <button type="button" aria-label="顯示確認新密碼" (click)="toggleVisible('confirmPassword')">
              <i
                class="bi"
                [class.bi-eye]="!visible.confirmPassword"
                [class.bi-eye-slash]="visible.confirmPassword"
              ></i>
            </button>
          </div>
        </label>

        <p class="rule-text">{{ passwordRule }}</p>

        <div class="action-row">
          <button type="button" class="cancel-btn" (click)="close()">取消</button>
          <button type="submit" class="save-btn">儲存變更</button>
        </div>
      </form>
    </article>
  </div>
</section>
