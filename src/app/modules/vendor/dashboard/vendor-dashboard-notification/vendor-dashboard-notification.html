<app-dashboard-notification
  [tabs]="tabs"
  [notifications]="notifications"
  [pageSize]="pageSize"
  [serverMode]="true"
  [totalItems]="totalItems"
  [loading]="loading"
  emptyText="目前沒有通知"
  (tabChange)="onTabChange($event)"
  (pageChange)="onPageChange($event)"
  (markRead)="onMarkRead($event)"
></app-dashboard-notification>
