<div class="date-range-selector">
  @if (displayTitle) {
    <span class="date-range-title">{{ displayTitle }}</span>
  }

  <div class="date-range-inputs">
    <label class="date-field">
      <i class="bi bi-calendar3"></i>
      <input
        #startInputEl
        type="text"
        placeholder="開始日期"
        aria-label="開始日期"
        [value]="startDate || ''"
        (focus)="showDatePicker($event)"
        (blur)="restorePlaceholder($event)"
        (change)="onStartDateChange($event)"
      />
    </label>

    <span class="date-separator">-</span>

    <label class="date-field">
      <i class="bi bi-calendar3"></i>
      <input
        #endInputEl
        type="text"
        placeholder="結束日期"
        aria-label="結束日期"
        [value]="endDate || ''"
        (focus)="showDatePicker($event)"
        (blur)="restorePlaceholder($event)"
        (change)="onEndDateChange($event)"
      />
    </label>
  </div>
</div>
