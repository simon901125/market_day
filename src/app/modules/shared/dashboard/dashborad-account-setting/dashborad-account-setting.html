<section class="account-settings-page">
  <div class="account-overlay" [class.is-closing]="isClosing">
    <article
      class="account-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="dashboardAccountSettingsTitle"
    >
      <header class="modal-header">
        <h2 id="dashboardAccountSettingsTitle">帳號設定</h2>
        <button type="button" class="icon-btn" aria-label="關閉帳號設定" (click)="close()">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <div class="settings-list">
        <section class="setting-card account-card">
          <div class="setting-icon">
            <i class="bi bi-wallet2"></i>
          </div>

          <div class="setting-content">
            <h3>基本帳號資料</h3>

            <dl class="account-data">
              <div>
                <dt>負責人姓名</dt>
                <dd>{{ account.name }}</dd>
              </div>
              <div>
                <dt>Email</dt>
                <dd>{{ account.email }}</dd>
              </div>
            </dl>

            <div class="google-row">
              <img src="assets/images/shared/google-icon.png" alt="Google" />
              <strong>Google 帳號綁定</strong>
              <span class="bind-status">{{ account.googleBound ? '已綁定' : '未綁定' }}</span>
              @if (!account.googleBound) {
                <button
                  type="button"
                  class="outline-action"
                  [disabled]="googleBinding"
                  (click)="requestGoogleBind()"
                >
                  {{ googleBinding ? '綁定中...' : '前往綁定' }}
                </button>
              }
            </div>

            @if (!account.googleBound) {
              <p class="muted">可綁定 Google 帳號以方便快速登入。</p>
            }
          </div>
        </section>

        <section class="setting-card compact">
          <div class="setting-icon">
            <i class="bi bi-lock"></i>
          </div>

          <div class="setting-content">
            <h3>修改密碼</h3>
            <p>{{ passwordRule }}</p>
          </div>

          <button type="button" class="outline-action" (click)="openPasswordSetting()">
            修改密碼
          </button>
        </section>

        <section class="setting-card compact danger">
          <div class="setting-icon">
            <i class="bi bi-exclamation-triangle"></i>
          </div>

          <div class="setting-content">
            <h3>申請註銷帳號</h3>
            <p>{{ cancellationWarning }}</p>
          </div>

          <button
            type="button"
            class="danger-action"
            (click)="accountDeletionDialog.requestDeletion()"
          >
            申請註銷帳號
          </button>
        </section>
      </div>

      <footer class="modal-footer">
        <button type="button" class="close-btn" (click)="close()">關閉</button>
      </footer>
    </article>
  </div>

  <app-account-deletion
    #accountDeletionDialog
    [accountRoleLabel]="accountRoleLabel"
    [loginPath]="loginPath"
    [canDelete]="accountDeletion.canDelete"
    [blockers]="accountDeletion.blockers"
  ></app-account-deletion>

  <app-dashboard-password-setting
    [(open)]="passwordSettingOpen"
    (saved)="handlePasswordSaved($event)"
  ></app-dashboard-password-setting>
</section>
