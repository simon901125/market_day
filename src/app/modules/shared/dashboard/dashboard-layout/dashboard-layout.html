<div class="dashboard-layout">
  <app-dashboard-sidebar
    [logoPath]="logoPath"
    [homePath]="homePath"
    [menuItems]="menuItems"
    [userMenuItems]="userMenuItems"
    [userName]="userName"
    [userEmail]="userEmail"
    [userInitial]="userInitial"
    [isCollapsed]="isSidebarCollapsed"
    (collapseToggle)="toggleSidebar()"
    (accountSettingsRequested)="openAccountSettings()"
    (organizerProfileRequested)="openOrganizerProfile()"
    (logoutRequested)="logout()"
  ></app-dashboard-sidebar>

  <main class="dashboard-main">
    <div class="page-transition">
      <router-outlet></router-outlet>
    </div>
  </main>

  @if (isAccountSettingsOpen && role === 'vendor') {
    <app-vendor-account-settings
      [navigateOnClose]="false"
      (closed)="closeAccountSettings()"
    ></app-vendor-account-settings>
  }

  @if (isAccountSettingsOpen && role === 'organizer') {
    <app-organizer-account-settings
      [navigateOnClose]="false"
      (closed)="closeAccountSettings()"
    ></app-organizer-account-settings>
  }

  <app-organizer-profile-modal
    [open]="isOrganizerProfileOpen && role === 'organizer'"
    [name]="userName"
    [email]="userEmail"
    (closed)="closeOrganizerProfile()"
    (saved)="saveOrganizerProfile()"
  ></app-organizer-profile-modal>
</div>
