<div class="dashboard-layout">
  <header class="mobile-dashboard-header">
    <button
      type="button"
      class="mobile-menu-toggle"
      aria-label="ťĖčŚēüŚįéŤ¶ĹťĀłŚĖģ"
      [attr.aria-expanded]="isMobileSidebarOpen"
      (click)="toggleMobileSidebar()"
    >
      <i class="bi bi-list"></i>
    </button>
    <img class="mobile-dashboard-logo" [src]="logoPath" [alt]="dashboardTitle" />
  </header>

  <button
    type="button"
    class="mobile-sidebar-backdrop"
    [class.visible]="isMobileSidebarOpen"
    aria-label="ťóúťĖČŚįéŤ¶ĹťĀłŚĖģ"
    (click)="closeMobileSidebar()"
  ></button>

  <app-dashboard-sidebar
    [class.mobile-open]="isMobileSidebarOpen"
    [logoPath]="logoPath"
    [homePath]="homePath"
    [menuItems]="menuItems"
    [userMenuItems]="userMenuItems"
    [userName]="userName"
    [userEmail]="userEmail"
    [userInitial]="userInitial"
    [isCollapsed]="isMobileViewport ? false : isSidebarCollapsed"
    [organizerProfileRequired]="organizerProfileRequired"
    [vendorProfileRequired]="vendorProfileRequired"
    (collapseToggle)="toggleSidebar()"
    (menuItemSelected)="closeMobileSidebar()"
    (accountSettingsRequested)="openAccountSettings()"
    (organizerProfileRequested)="openOrganizerProfile()"
    (lockedMenuItemRequested)="handleLockedMenuItem($event)"
    (logoutRequested)="logout()"
  ></app-dashboard-sidebar>

  <main class="dashboard-main">
    <div class="page-transition">
      <router-outlet></router-outlet>
    </div>
  </main>

  @if (isAccountSettingsOpen && role === 'vendor') {
    <app-vendor-account-settings
      [navigateOnClose]="false"
      (closed)="closeAccountSettings()"
    ></app-vendor-account-settings>
  }

  @if (isAccountSettingsOpen && role === 'organizer') {
    <app-organizer-account-settings
      [navigateOnClose]="false"
      (closed)="closeAccountSettings()"
    ></app-organizer-account-settings>
  }

  <app-organizer-profile-modal
    [open]="isOrganizerProfileOpen && role === 'organizer'"
    [name]="userName"
    [email]="userEmail"
    (closed)="closeOrganizerProfile()"
    (saved)="saveOrganizerProfile()"
  ></app-organizer-profile-modal>
</div>
