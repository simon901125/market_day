<section class="notification-page" [class.home-mode]="limitItems">
  <div class="page-header">
    <h1>{{ title }}</h1>

    @if (viewAllLink) {
      <a class="view-all-link" [routerLink]="viewAllLink">
        {{ viewAllText }} <i class="bi bi-chevron-right"></i>
      </a>
    }
  </div>

  @if (showTabs) {
    <div class="tabs">
      @for (tab of tabs; track tab) {
        <button
          type="button"
          [class.active]="activeTab === tab"
          (click)="setTab(tab)"
        >
          {{ tab }}
        </button>
      }
    </div>
  }

  @if (pagedNotifications().length) {
    <div class="notification-list">
      @for (item of pagedNotifications(); track item.title) {
        <article
          class="notification-card"
          [class.unread]="item.unread"
          (click)="markAsRead(item)"
        >
          <div class="dot" [class.show]="item.unread"></div>

          <i class="notice-icon" [class]="item.icon" [ngClass]="item.iconClass"></i>

          <h3>
            <span class="status-text">【{{ item.status }}】</span>
            {{ item.title }}
          </h3>

          <time>{{ item.date }}</time>
        </article>
      }
    </div>
  }

  @if (showPagination) {
    <app-dashboard-pagination
      [currentPage]="currentPage"
      [pageSize]="pageSize"
      [totalItems]="filteredNotifications.length"
      (pageChange)="setPage($event)"
    ></app-dashboard-pagination>
  }
</section>
