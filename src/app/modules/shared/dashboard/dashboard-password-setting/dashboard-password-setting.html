<!-- 修改密碼彈跳視窗 -->
@if (open) {
  <div class="account-overlay" [class.is-closing]="isClosing" (click)="closeFromBackdrop($event)">
    <article class="account-modal password-modal" role="dialog" aria-modal="true" aria-labelledby="dashboardPasswordTitle">
      <header class="modal-header password-header">
        <div class="title-wrap">
          <i class="bi bi-lock"></i>
          <h2 id="dashboardPasswordTitle">修改密碼</h2>
        </div>

        <button type="button" class="icon-btn" aria-label="關閉修改密碼" (click)="close()">
          <i class="bi bi-x-lg"></i>
        </button>
      </header>

      <p class="description">為了保護帳號安全，請輸入目前密碼並設定新密碼。</p>

      <form class="settings-list password-form" (ngSubmit)="save()">
        <!-- 密碼欄位使用雙向綁定，未來可直接將 passwordForm 串接修改密碼 API。 -->
        <label class="field-group">
          <span>目前密碼</span>
          <div class="password-input">
            <input
              [type]="visible.currentPassword ? 'text' : 'password'"
              name="currentPassword"
              placeholder="請輸入目前密碼"
              autocomplete="current-password"
              [(ngModel)]="passwordForm.currentPassword"
            />
            <button type="button" aria-label="切換目前密碼顯示" (click)="toggleVisible('currentPassword')">
              <i class="bi" [class.bi-eye]="visible.currentPassword" [class.bi-eye-slash]="!visible.currentPassword"></i>
            </button>
          </div>
        </label>

        <label class="field-group">
          <span>新密碼</span>
          <div class="password-input">
            <input
              [type]="visible.newPassword ? 'text' : 'password'"
              name="newPassword"
              placeholder="請輸入新密碼"
              autocomplete="new-password"
              [(ngModel)]="passwordForm.newPassword"
            />
            <button type="button" aria-label="切換新密碼顯示" (click)="toggleVisible('newPassword')">
              <i class="bi" [class.bi-eye]="visible.newPassword" [class.bi-eye-slash]="!visible.newPassword"></i>
            </button>
          </div>
          <div class="password-rule-list" aria-live="polite">
            <span>密碼需符合以下規則：</span>
            <span class="rule-item" [class.valid]="hasPasswordMinLength">
              <i
                class="bi"
                [class.bi-check-circle-fill]="hasPasswordMinLength"
                [class.bi-circle]="!hasPasswordMinLength"
              ></i>
              至少 8 碼
            </span>
            <span class="rule-item" [class.valid]="hasPasswordLetterAndNumber">
              <i
                class="bi"
                [class.bi-check-circle-fill]="hasPasswordLetterAndNumber"
                [class.bi-circle]="!hasPasswordLetterAndNumber"
              ></i>
              包含英文字母與數字
            </span>
          </div>
        </label>

        <label class="field-group">
          <span>確認新密碼</span>
          <div class="password-input">
            <input
              [type]="visible.confirmPassword ? 'text' : 'password'"
              name="confirmPassword"
              placeholder="請再次輸入新密碼"
              autocomplete="new-password"
              [(ngModel)]="passwordForm.confirmPassword"
            />
            <button type="button" aria-label="切換確認新密碼顯示" (click)="toggleVisible('confirmPassword')">
              <i
                class="bi"
                [class.bi-eye]="visible.confirmPassword"
                [class.bi-eye-slash]="!visible.confirmPassword"
              ></i>
            </button>
          </div>
        </label>

        @if (errorMessage) {
          <p class="rule-text" role="alert">{{ errorMessage }}</p>
        }

        <div class="modal-footer action-row">
          <button type="button" class="cancel-btn" (click)="close()">取消</button>
          <button type="submit" class="danger-action save-btn">儲存變更</button>
        </div>
      </form>
    </article>
  </div>
}
