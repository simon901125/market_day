<article class="todo-card">
  <div class="todo-icon-wrap {{ iconColor }}">
    <i class="bi {{ icon }}"></i>
  </div>

  <div class="todo-body">
    <h3 class="todo-label">{{ label }}</h3>
    <p class="todo-count">
      <span class="count-num">{{ count }}</span>
      <span class="count-unit">{{ unit }}</span>
    </p>
  </div>

  @if (path) {
    <a class="todo-link" [routerLink]="path" [queryParams]="queryParams">
      前往查看 <i class="bi bi-chevron-right"></i>
    </a>
  }
</article>
