<aside class="dashboard-sidebar" [class.collapsed]="isCollapsed">
  <div class="brand-row">
    <div class="brand" [routerLink]="homePath">
      <img [src]="isCollapsed ? collapsedLogoPath : logoPath" alt="Market Day" />
    </div>
  </div>

  <button
    type="button"
    class="sidebar-toggle"
    [attr.aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    [attr.title]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    (click)="toggleCollapse($event)"
  >
    <i class="bi" [class.bi-chevron-right]="isCollapsed" [class.bi-chevron-left]="!isCollapsed"></i>
  </button>

  <nav class="menu">
    @for (item of menuItems; track item.path) {
      <a class="menu-item" [routerLink]="item.path" routerLinkActive="active" [attr.title]="isCollapsed ? item.label : null">
        <i class="bi" [ngClass]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="user-area" (click)="$event.stopPropagation()">
    @if (isUserMenuOpen) {
      <div class="user-menu">
        @for (item of userMenuItems; track item.label) {
          @if (item.action === 'logout') {
            <button type="button" class="user-menu-item logout" (click)="logout()">
              <i class="bi" [ngClass]="item.icon"></i>
              <span>{{ item.label }}</span>
            </button>
          } @else {
            <a class="user-menu-item" [routerLink]="item.path">
              <i class="bi" [ngClass]="item.icon"></i>
              <span>{{ item.label }}</span>
            </a>
          }
        }
      </div>
    }

    <button
      type="button"
      class="user-box"
      [class.open]="isUserMenuOpen"
      [attr.title]="isCollapsed ? userName : null"
      (click)="toggleUserMenu()"
    >
      <div class="user-avatar">
        {{ userInitial }}
      </div>

      <div class="user-info">
        <strong>{{ userName }}</strong>
        <span>{{ userEmail }}</span>
      </div>

      <i
        class="bi"
        [class.bi-chevron-up]="isUserMenuOpen"
        [class.bi-chevron-down]="!isUserMenuOpen"
      ></i>
    </button>
  </div>
</aside>
