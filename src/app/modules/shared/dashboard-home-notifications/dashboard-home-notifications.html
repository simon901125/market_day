<section class="notifications-section">
  <header class="section-header">
    <h2 class="section-title">最新通知</h2>
    <a class="view-all-link" [routerLink]="viewAllLink">
      查看全部 <i class="bi bi-chevron-right"></i>
    </a>
  </header>
  <ul class="notification-list">
    @for (item of notifications; track item.time) {
      <li class="notification-item" >
        <span class="notification-icon {{ item.iconColor }}">
          <i class="bi {{ item.icon }}"></i>
        </span>
        <div class="notification-content">
          <p class="notification-text">
            <span class="notification-tag">{{ item.tag }}</span>
            {{ item.content }}
          </p>
        </div>
        <time class="notification-time">{{ item.time }}</time>
      </li>
    }
  </ul>
</section>
