<section class="organizer-collection-management dashboard-list-page page-transition">
  <header class="app-page-header">
    <h1 class="app-page-title">收款管理</h1>
  </header>

  <section class="app-filter-bar organizer-collection-filter" aria-label="收款篩選">
    <label class="app-search-field keyword-field">
      <span class="app-control-title">關鍵字</span>
      <span class="app-search-input">
        <i class="bi bi-search"></i>
        <input
          type="search"
          placeholder="搜尋活動名稱 / 品牌名稱"
          [(ngModel)]="keyword"
          (keyup.enter)="searchCollections()"
        />
      </span>
    </label>

    <app-dropdown
      title="付款狀態"
      [options]="statusOptions"
      [selectedValue]="selectedStatus"
      (optionSelected)="selectStatus($event)"
    ></app-dropdown>

    <app-date-range-selector
      selectorTitle="付款日期"
      [startDate]="filterStartDate"
      [endDate]="filterEndDate"
    ></app-date-range-selector>

    <button type="button" class="app-btn search" (click)="searchCollections()">搜尋</button>
  </section>

  <div class="dashboard-list-content">
    <app-dashboard-data-table
      class="collection-table"
      [columns]="columns"
      [rows]="displayRows"
      tableMinWidth="1180px"
      emptyText="目前沒有收款資料"
      [rowClickable]="true"
      (rowClick)="onTableRowClick($event)"
      (actionClick)="onTableAction($event)"
    ></app-dashboard-data-table>
  </div>

  <app-dashboard-pagination
    class="dashboard-list-pagination"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
