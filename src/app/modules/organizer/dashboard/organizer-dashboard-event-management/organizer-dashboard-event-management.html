<section class="organizer-dashboard-event-management dashboard-list-page page-transition">
  <header class="app-page-header">
    <h1 class="app-page-title">活動管理</h1>
    <button type="button" class="app-btn primary app-create-btn" routerLink="/organizer/dash-board/activity/detail">
      <i class="bi bi-plus-lg"></i>
      建立活動
    </button>
  </header>

  <section class="app-filter-bar organizer-event-filter" aria-label="活動篩選">
    <label class="app-search-field">
      <span class="app-control-title">活動名稱</span>
      <span class="app-search-input">
        <i class="bi bi-search"></i>
        <input type="search" placeholder="請輸入活動名稱" [(ngModel)]="searchKeyword" (keyup.enter)="searchActivities()" />
      </span>
    </label>

    <app-dropdown
      title="活動狀態"
      [options]="statusOptions"
      placeholder="全部狀態"
      [selectedValue]="selectedStatus"
      (optionSelected)="selectStatus($event)"
    ></app-dropdown>

    <app-date-range-selector
      selectorTitle="活動日期"
      [startDate]="filterStartDate"
      [endDate]="filterEndDate"
    ></app-date-range-selector>

    <button type="button" class="app-btn search" (click)="searchActivities()">搜尋</button>
  </section>

  <div class="dashboard-list-content">
    <app-dashboard-data-table
      class="event-table"
      [columns]="columns"
      [rows]="displayRows"
      tableMinWidth="1120px"
      emptyText="目前沒有活動資料"
      (actionClick)="onTableAction($event)"
    ></app-dashboard-data-table>
  </div>

  <app-dashboard-pagination
    class="dashboard-list-pagination"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    [totalItems]="totalItems"
    (pageChange)="onPageChange($event)"
  ></app-dashboard-pagination>
</section>
