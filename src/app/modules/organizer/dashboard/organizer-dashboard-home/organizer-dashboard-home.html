<section class="organizer-dashboard-home page-transition">
  <header class="welcome-header">
    <h1 class="welcome-title">歡迎回來，董映彤！ <span aria-hidden="true">👋</span></h1>
    <p class="welcome-subtitle">一起打造精彩的市集活動，讓好品牌被更多人看見！</p>
  </header>

  <section class="todo-section">
    <div class="todo-cards">
      @for (item of todoItems; track item.label) {
        <app-dashboard-home-todo-card
          [icon]="item.icon"
          [count]="item.count"
          [unit]="item.unit"
          [label]="item.label"
          [path]="item.path"
          [iconColor]="item.iconColor ?? 'orange'"
        />
      }
    </div>
  </section>

  <app-dashboard-notification
    title="最新通知"
    [tabs]="tabs"
    [notifications]="notifications"
    [maxItems]="6"
    [limitItems]="true"
    [showTabs]="false"
    [showPagination]="false"
    viewAllLink="/organizer/dash-board/notification"
    viewAllText="查看全部"
  />
</section>
