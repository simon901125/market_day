<section class="stall-management dashboard-list-page page-transition">
  <header class="app-page-header"><h1 class="app-page-title">攤位管理</h1></header>

  <section class="stall-filters app-filter-bar" aria-label="攤位活動篩選">
    <label class="app-search-field"><span class="app-control-title">活動名稱</span><span class="app-search-input"><i class="bi bi-search"></i><input type="search" placeholder="搜尋活動名稱" [(ngModel)]="keyword" (keyup.enter)="search()" /></span></label>
    <app-dropdown title="活動狀態" [options]="statusOptions" [selectedValue]="selectedStatus" (optionSelected)="selectStatus($event)"></app-dropdown>
    <app-date-range-selector selectorTitle="活動日期" [startDate]="startDate || null" [endDate]="endDate || null"></app-date-range-selector>
    <button class="app-btn search" type="button" (click)="search()">搜尋</button>
  </section>

  <div class="dashboard-list-content">
    <app-dashboard-data-table class="stall-table" [columns]="columns" [rows]="displayRows" tableMinWidth="1160px" emptyText="目前沒有符合條件的活動" (actionClick)="onTableAction($event)"></app-dashboard-data-table>
  </div>
  <app-dashboard-pagination class="dashboard-list-pagination" [currentPage]="currentPage" [pageSize]="pageSize" [totalItems]="filteredEvents.length" (pageChange)="onPageChange($event)"></app-dashboard-pagination>
</section>
