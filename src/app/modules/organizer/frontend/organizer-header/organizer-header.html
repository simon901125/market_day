<header class="organizer-header">
  <div class="header-inner">
    <button
      type="button"
      class="menu-btn"
      aria-label="開啟主辦方導覽選單"
      [attr.aria-expanded]="isMenuOpen"
      aria-controls="organizer-mobile-menu"
      (click)="toggleMenu()"
    >
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>

    <a routerLink="/organizer/home" class="brand" (click)="closeMenu()">
      <img src="/assets/images/logo/logo-market-day-organizer-zone.png" alt="小集日主辦方專區" />
    </a>

    <nav class="nav-links" aria-label="主辦方導覽">
      <a routerLink="/user/home" (click)="closeMenu()">回小集日首頁</a>
      <a
        routerLink="/organizer/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeMenu()"
      >
        首頁
      </a>
      @if (isLoggedIn) {
      <a
        [href]="managementUrl"
        target="_blank"
        rel="noopener noreferrer"
        (click)="closeMenu()"
      >
        管理後台
      </a>
      }
      <a routerLink="/organizer/about" routerLinkActive="active" (click)="closeMenu()">關於我們</a>
    </nav>

    <div class="header-actions">
      @if (isLoggedIn && user) {
        <span class="account-name">
          <i class="bi bi-person-circle"></i>
          {{ user.name }}
        </span>
        <button type="button" class="logout-btn" [disabled]="isLoggingOut" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i>
          登出
        </button>
      } @else {
        <a routerLink="/organizer/login" target="_blank" rel="noopener noreferrer" class="login-btn" (click)="closeMenu()">登入</a>
        <a routerLink="/organizer/register" target="_blank" rel="noopener noreferrer" class="register-btn" (click)="closeMenu()">註冊</a>
      }
    </div>
  </div>
</header>

<button
  class="menu-backdrop"
  type="button"
  aria-label="關閉主辦方導覽選單"
  [class.open]="isMenuOpen"
  (click)="closeMenu()"
></button>

<aside
  id="organizer-mobile-menu"
  class="mobile-drawer"
  [class.open]="isMenuOpen"
  [attr.aria-hidden]="!isMenuOpen"
>
  <div class="drawer-header">
    <div class="drawer-brand">
      <img src="/assets/images/logo/logo-market-day-organizer-zone.png" alt="小集日主辦方專區" />
    </div>
    <button type="button" aria-label="關閉主辦方導覽選單" (click)="closeMenu()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <nav aria-label="手機主辦方導覽">
    <a routerLink="/user/home">回小集日首頁</a>
    <a routerLink="/organizer/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">首頁</a>
    @if (isLoggedIn) {
    <a
      [href]="managementUrl"
      target="_blank"
      rel="noopener noreferrer"
      (click)="closeMenu()"
    >
      管理後台
    </a>
    }
    <a routerLink="/organizer/about" routerLinkActive="active">關於我們</a>
  </nav>

  <div class="drawer-actions">
    @if (isLoggedIn && user) {
      <span class="account-name">
        <i class="bi bi-person-circle"></i>
        {{ user.name }}
      </span>
      <button type="button" class="logout-btn" [disabled]="isLoggingOut" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        登出
      </button>
    } @else {
      <a href="/organizer/login" target="_blank" rel="noopener noreferrer" class="login-btn">登入</a>
      <a href="/organizer/register" target="_blank" rel="noopener noreferrer" class="register-btn">註冊</a>
    }
  </div>
</aside>
